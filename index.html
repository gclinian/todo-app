<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple Todo List application built with HTML, CSS, and JavaScript">
    <title>Todo List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Fixed Header Section -->
        <header class="header">
            <h1 class="title">todo list</h1>
            
            <!-- New Todo Input Section -->
            <div class="input-section">
                <div class="todo-input-wrapper">
                    <input 
                        type="text" 
                        id="new-todo-input" 
                        class="todo-input" 
                        placeholder="new todo"
                    >
                    <button id="add-btn" class="add-btn">add</button>
                </div>
                
                <textarea 
                    id="description-input" 
                    class="description-input" 
                    placeholder="description"
                    rows="3"
                ></textarea>
            </div>
        </header>
        
        <!-- Scrollable Todo List Section -->
        <main class="todo-list-container">
            <ul id="todo-list" class="todo-list">
                <!-- Todo items will be dynamically inserted here -->
            </ul>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
